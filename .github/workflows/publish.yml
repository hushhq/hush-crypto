name: Publish WASM Package
on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM
        run: wasm-pack build --target web --scope gethush --out-dir pkg/
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          scope: '@gethush'
      - name: Verify WASM binary exists
        run: test -f pkg/hush_crypto_bg.wasm || (echo "WASM binary missing" && exit 1)
      - name: Check version is not already published
        run: |
          PKG_VERSION="$(node -e "console.log(require('./pkg/package.json').version)")"
          echo "Checking whether @gethush/hush-crypto@${PKG_VERSION} is already on npmjs.com..."
          if npm view "@gethush/hush-crypto@${PKG_VERSION}" version 2>/dev/null | grep -qF "${PKG_VERSION}"; then
            echo "ERROR: @gethush/hush-crypto@${PKG_VERSION} is already published."
            echo "Bump the version in Cargo.toml before tagging a new release."
            exit 1
          fi
          echo "@gethush/hush-crypto@${PKG_VERSION} not yet published - proceeding."
      - name: Publish to npmjs.com
        run: npm publish pkg/ --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
